{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Edit Staff Image: {{ staff.full_name }}</h2>
    
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Original Image</div>
                <div class="card-body">
                    <img src="{{ url_for('uploaded_file', folder='staff_images', filename=staff.image_path.split('/')[-1]) if staff.image_path else '' }}" 
                         class="img-fluid" alt="Original">
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Edit Controls</div>
                <div class="card-body">
                    <form id="editForm" method="POST">
                        <div class="mb-3">
                            <label>Brightness (0.5 - 2.0)</label>
                            <input type="range" name="brightness" min="0.5" max="2.0" step="0.1" value="1.0" 
                                   class="form-range" onchange="updatePreview()">
                            <span id="brightnessVal">1.0</span>
                        </div>
                        
                        <div class="mb-3">
                            <label>Contrast (0.5 - 2.0)</label>
                            <input type="range" name="contrast" min="0.5" max="2.0" step="0.1" value="1.0" 
                                   class="form-range" onchange="updatePreview()">
                            <span id="contrastVal">1.0</span>
                        </div>
                        
                        <div class="mb-3">
                            <label>Sharpness (0.5 - 3.0)</label>
                            <input type="range" name="sharpness" min="0.5" max="3.0" step="0.1" value="1.0" 
                                   class="form-range" onchange="updatePreview()">
                            <span id="sharpnessVal">1.0</span>
                        </div>
                        
                        <div class="mb-3">
                            <label>Rotate (degrees)</label>
                            <select name="rotate" class="form-select">
                                <option value="0">0°</option>
                                <option value="90">90°</option>
                                <option value="180">180°</option>
                                <option value="270">270°</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label>Filter</label>
                            <select name="filter" class="form-select">
                                <option value="none">None</option>
                                <option value="blur">Blur</option>
                                <option value="sharpen">Sharpen</option>
                                <option value="edge">Edge Detection</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label>Add Text</label>
                            <input type="text" name="text_content" class="form-control" placeholder="Text to add">
                            <div class="row mt-2">
                                <div class="col">
                                    <input type="number" name="text_x" placeholder="X" class="form-control">
                                </div>
                                <div class="col">
                                    <input type="number" name="text_y" placeholder="Y" class="form-control">
                                </div>
                                <div class="col">
                                    <input type="number" name="text_size" placeholder="Size" class="form-control">
                                </div>
                                <div class="col">
                                    <input type="color" name="text_color" value="#ffffff" class="form-control">
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Apply Changes</button>
                        <a href="{{ url_for('admin_staff') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function updatePreview() {
    document.getElementById('brightnessVal').textContent = document.querySelector('[name="brightness"]').value;
    document.getElementById('contrastVal').textContent = document.querySelector('[name="contrast"]').value;
    document.getElementById('sharpnessVal').textContent = document.querySelector('[name="sharpness"]').value;
}
</script>
{% endblock %}
